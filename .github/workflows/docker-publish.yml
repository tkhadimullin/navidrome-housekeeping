name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
  workflow_dispatch: # allow manual triggers

env:
  REGISTRY: docker.io
  IMAGE_NAME: navidrome-unwanted-cleanup

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:      
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/navidrome-housekeeping:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/navidrome-housekeeping:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/navidrome-housekeeping:cache
          cache-to: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/navidrome-housekeeping:cache,mode=max
